services:
  shell:
    image: ghcr.io/openforgelabs/rainbowexplorer-shell:latest
    ports:
      - "3000:3000"
    environment:
      - PLUGIN_RUNNER_URL=http://runner:5099
      - NEXT_PUBLIC_PLUGIN_RUNNER_URL=http://runner:5099
    depends_on:
      runner:
        condition: service_healthy

  runner:
    image: ghcr.io/openforgelabs/rainbowexplorer-runner:latest
    ports:
      - "5099:5099"
    environment:
      - RUNNER_PORT=5099
      - RUNNER_HOST=0.0.0.0
      - RUNNER_PORT_START=4100
      - RUNNER_PORT_END=4999
      - RAINBOW_SHARED_DIR=/root/.rainbow
      - RUNNER_SHARED_DOCKER_VOLUME=rainbow-data
      # Browser-facing URL for plugin views exposed by runner.
      - RUNNER_PLUGIN_PUBLIC_PROTOCOL=http
      - RUNNER_PLUGIN_PUBLIC_HOST=localhost
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - rainbow-data:/root/.rainbow
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5099/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  plugin-redis:
    image: ghcr.io/openforgelabs/rainbow-redis:latest
    profiles: ["plugins"]
    ports:
      - "4011:4011"

volumes:
  rainbow-data:
