services:
  shell:
    image: ghcr.io/openforgelabs/rainbowexplorer-shell:latest
    ports:
      - "3000:3000"
    environment:
      - PLUGIN_RUNNER_URL=http://runner:5099
      - NEXT_PUBLIC_PLUGIN_RUNNER_URL=http://runner:5099
      - RAINBOW_REGISTRY_PATH=/root/.rainbow/plugin-registry.json
    depends_on:
      runner:
        condition: service_healthy
    volumes:
      - rainbow-data:/root/.rainbow
    networks:
      - rainbow-net

  runner:
    image: ghcr.io/openforgelabs/rainbowexplorer-runner:latest
    ports:
      - "5099:5099"
    environment:
      - RUNNER_PORT=5099
      - RUNNER_HOST=0.0.0.0
      - RUNNER_PORT_START=4100
      - RUNNER_PORT_END=4999
      - RAINBOW_SHARED_DIR=/root/.rainbow
      - RUNNER_SHARED_DOCKER_VOLUME=rainbow-data
      - RUNNER_PLUGIN_DOCKER_NETWORK=rainbow-net
      - RUNNER_PLUGIN_PUBLIC_PROTOCOL=http
      - RUNNER_PLUGIN_PUBLIC_HOST=localhost
      - RUNNER_MANIFEST_TIMEOUT_MS=120000
      - RUNNER_MANIFEST_RETRY_MS=2000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - rainbow-data:/root/.rainbow
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5099/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - rainbow-net

volumes:
  rainbow-data:
    name: rainbow-data

networks:
  rainbow-net:
    name: rainbow-net
