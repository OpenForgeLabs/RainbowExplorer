name: Publish Explorer Images

on:
  push:
    tags:
      - "v*"
      - "shell-v*"
      - "runner-v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_target:
        description: "Select which image to publish"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "shell"
          - "runner"
      publish_latest:
        description: "Also push :latest"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_SHELL: ghcr.io/openforgelabs/rainbowexplorer-shell
  IMAGE_RUNNER: ghcr.io/openforgelabs/rainbowexplorer-runner

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: shell
            image: ghcr.io/openforgelabs/rainbowexplorer-shell
            dockerfile: docker/Dockerfile.shell
            use_secret: true
          - name: runner
            image: ghcr.io/openforgelabs/rainbowexplorer-runner
            dockerfile: docker/Dockerfile.runner
            use_secret: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Publish Scope
        id: scope
        shell: bash
        run: |
          publish="false"
          target="${{ github.event.inputs.image_target || 'all' }}"
          image="${{ matrix.name }}"
          ref_name="${GITHUB_REF_NAME}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "$target" == "all" || "$target" == "$image" ]]; then
              publish="true"
            fi
          else
            if [[ "$ref_name" =~ ^shell-v ]]; then
              [[ "$image" == "shell" ]] && publish="true"
            elif [[ "$ref_name" =~ ^runner-v ]]; then
              [[ "$image" == "runner" ]] && publish="true"
            else
              publish="true"
            fi
          fi

          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        if: steps.scope.outputs.publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=match,pattern=^v(.*)$,group=1
            type=match,pattern=^shell-v(.*)$,group=1,enable=${{ matrix.name == 'shell' }}
            type=match,pattern=^runner-v(.*)$,group=1,enable=${{ matrix.name == 'runner' }}
            type=sha
            type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_latest == 'true' }}

      - name: Smoke test runner image (docker-cli availability)
        if: steps.scope.outputs.publish == 'true' && matrix.name == 'runner'
        run: |
          docker build -f docker/Dockerfile.runner -t rainbow-runner-smoke:${{ github.sha }} .
          docker run --rm rainbow-runner-smoke:${{ github.sha }} docker --version

      - name: Build & push (${{ matrix.name }})
        if: steps.scope.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: ${{ matrix.use_secret && format('gh_packages_token={0}', secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN) || '' }}
