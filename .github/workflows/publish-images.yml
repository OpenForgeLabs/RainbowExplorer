name: Publish Explorer Images

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      image_target:
        description: "Select which image to publish"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "shell"
          - "runner"
      publish_latest:
        description: "Also push :latest"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_SHELL: ghcr.io/openforgelabs/rainbowexplorer-shell
  IMAGE_RUNNER: ghcr.io/openforgelabs/rainbowexplorer-runner

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Configure npm auth for GitHub Packages
        run: |
          printf "@openforgelabs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\n" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Install
        run: pnpm install

      - name: Create Release PR or Continue Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: echo "No npm publish for this repo"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed package versions
        id: detect
        if: steps.changesets.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          set -euo pipefail
          prev_ref="HEAD^"
          if ! git rev-parse "$prev_ref" >/dev/null 2>&1; then
            prev_ref="$(git rev-list --max-parents=0 HEAD)"
          fi

          curr_shell_version=$(node -p "require('./apps/shell/package.json').version")
          curr_runner_version=$(node -p "require('./apps/runner/package.json').version")

          prev_shell_version=$(git show "$prev_ref:apps/shell/package.json" 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{console.log(JSON.parse(s).version||'')}catch{console.log('')}})" || true)
          prev_runner_version=$(git show "$prev_ref:apps/runner/package.json" 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{console.log(JSON.parse(s).version||'')}catch{console.log('')}})" || true)

          shell_changed="false"
          runner_changed="false"
          if [[ "$curr_shell_version" != "$prev_shell_version" ]]; then shell_changed="true"; fi
          if [[ "$curr_runner_version" != "$prev_runner_version" ]]; then runner_changed="true"; fi

          echo "shell_changed=$shell_changed" >> "$GITHUB_OUTPUT"
          echo "runner_changed=$runner_changed" >> "$GITHUB_OUTPUT"
          echo "shell_version=$curr_shell_version" >> "$GITHUB_OUTPUT"
          echo "runner_version=$curr_runner_version" >> "$GITHUB_OUTPUT"

      - name: Resolve publish scope
        id: scope
        if: steps.changesets.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          set -euo pipefail
          target="${{ github.event.inputs.image_target || 'all' }}"

          publish_shell="false"
          if [[ "${{ steps.detect.outputs.shell_changed }}" == "true" ]]; then
            if [[ "$target" == "all" || "$target" == "shell" ]]; then
              publish_shell="true"
            fi
          fi

          publish_runner="false"
          if [[ "${{ steps.detect.outputs.runner_changed }}" == "true" ]]; then
            if [[ "$target" == "all" || "$target" == "runner" ]]; then
              publish_runner="true"
            fi
          fi

          echo "publish_shell=$publish_shell" >> "$GITHUB_OUTPUT"
          echo "publish_runner=$publish_runner" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.changesets.outputs.hasChangesets == 'false' && (steps.scope.outputs.publish_shell == 'true' || steps.scope.outputs.publish_runner == 'true')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changesets.outputs.hasChangesets == 'false' && (steps.scope.outputs.publish_shell == 'true' || steps.scope.outputs.publish_runner == 'true')
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.changesets.outputs.hasChangesets == 'false' && (steps.scope.outputs.publish_shell == 'true' || steps.scope.outputs.publish_runner == 'true')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (shell)
        id: meta_shell
        if: steps.scope.outputs.publish_shell == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SHELL }}
          tags: |
            type=raw,value=${{ steps.detect.outputs.shell_version }}
            type=sha
            type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_latest == 'true' }}

      - name: Build & push (shell)
        if: steps.scope.outputs.publish_shell == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.shell
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          labels: ${{ steps.meta_shell.outputs.labels }}
          tags: ${{ steps.meta_shell.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            gh_packages_token=${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create git tag (shell)
        if: steps.scope.outputs.publish_shell == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="shell-v${{ steps.detect.outputs.shell_version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists. Skipping."
            exit 0
          fi
          git tag -a "$tag" -m "Release shell ${{ steps.detect.outputs.shell_version }}"
          git push origin "$tag"

      - name: Create GitHub Release (shell)
        if: steps.scope.outputs.publish_shell == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="shell-v${{ steps.detect.outputs.shell_version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub release $tag already exists. Skipping."
            exit 0
          fi
          gh release create "$tag" \
            --title "RainbowExplorer Shell ${{ steps.detect.outputs.shell_version }}" \
            --generate-notes

      - name: Smoke test runner image (docker-cli availability)
        if: steps.scope.outputs.publish_runner == 'true'
        run: |
          docker build -f docker/Dockerfile.runner -t rainbow-runner-smoke:${{ github.sha }} .
          docker run --rm rainbow-runner-smoke:${{ github.sha }} docker --version

      - name: Docker metadata (runner)
        id: meta_runner
        if: steps.scope.outputs.publish_runner == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_RUNNER }}
          tags: |
            type=raw,value=${{ steps.detect.outputs.runner_version }}
            type=sha
            type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_latest == 'true' }}

      - name: Build & push (runner)
        if: steps.scope.outputs.publish_runner == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.runner
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          labels: ${{ steps.meta_runner.outputs.labels }}
          tags: ${{ steps.meta_runner.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag (runner)
        if: steps.scope.outputs.publish_runner == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="runner-v${{ steps.detect.outputs.runner_version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists. Skipping."
            exit 0
          fi
          git tag -a "$tag" -m "Release runner ${{ steps.detect.outputs.runner_version }}"
          git push origin "$tag"

      - name: Create GitHub Release (runner)
        if: steps.scope.outputs.publish_runner == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="runner-v${{ steps.detect.outputs.runner_version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub release $tag already exists. Skipping."
            exit 0
          fi
          gh release create "$tag" \
            --title "RainbowExplorer Runner ${{ steps.detect.outputs.runner_version }}" \
            --generate-notes
